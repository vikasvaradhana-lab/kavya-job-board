name: Daily Job Board Update

on:
  schedule:
    # Run every day at 8 AM UTC (adjust timezone as needed)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run job scraper
        id: scraper
        run: node .github/workflows/scraper.js
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Notify on success
        if: success()
        run: echo "✅ Job board updated successfully at $(date)"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Job board update failed - check logs"
